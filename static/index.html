<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网址收藏夹</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <div id="app" @click="handleRootClick">
      <header class="app-header">
        <h1>网址收藏夹</h1>
        <div class="header-actions">
          <button class="primary" @click="openAddFolder(null)">新建文件夹</button>
          <button class="secondary" @click="openAddBookmark(null)">添加网址</button>
        </div>
      </header>

      <main class="app-main">
        <section class="tree-panel">
          <div class="panel-header">
            <div class="panel-title horizontal">
              <h2>结构</h2>
              <button class="tertiary small" @click="toggleTreeActions">
                {{ treeActionsVisible ? '完成' : '编辑' }}
              </button>
            </div>
          </div>
          <ul class="tree-root">
            <bookmark-node
              v-for="node in tree"
              :key="node.id"
              :node="node"
              :level="0"
              :selected-id="selectedNodeId"
              :global-actions-visible="treeActionsVisible"
              @add-folder="openAddFolder"
              @add-bookmark="openAddBookmark"
              @edit="openEdit"
              @delete="confirmDelete"
              @select="selectNode"
              @move="reorderNode"
              @context="showFolderActions"
            ></bookmark-node>
          </ul>
        </section>

        <section class="list-panel">
          <div class="panel-header">
            <div class="panel-title">
              <h2>网址列表</h2>
              <span class="panel-tip">
                {{ listTitle }}
              </span>
            </div>
          </div>
          <div v-if="displayBookmarks.length === 0" class="placeholder">
            暂无收藏的网址。
          </div>
          <ul v-else class="bookmark-list">
            <li v-for="item in displayBookmarks" :key="item.id" class="bookmark-item">
              <div class="bookmark-main">
                <span class="node-icon">
                  <img v-if="item.favicon_url" :src="item.favicon_url" alt="favicon" />
                  <span v-else>🔖</span>
                </span>
                <div class="bookmark-info">
                  <a :href="item.url" class="bookmark-title" target="_blank" rel="noopener">
                    {{ item.title }}
                  </a>
                  <span class="bookmark-url">{{ item.url }}</span>
                  <span class="bookmark-path" v-if="item.path">
                    {{ item.path }}
                  </span>
                </div>
              </div>
              <div class="bookmark-actions">
                <button class="tertiary" @click="openEdit(item.raw)">编辑</button>
                <button class="secondary" @click="confirmDelete(item.raw)">删除</button>
              </div>
            </li>
          </ul>
        </section>
      </main>

      <transition name="fade">
        <div
          v-if="contextMenu.visible && contextNode"
          class="context-menu"
          :style="contextMenuStyle"
          @click.stop
        >
          <button type="button" @click="contextAddFolder">
            <span class="action-icon">📂</span>
            <span class="action-text">新建子文件夹</span>
          </button>
          <button type="button" @click="contextAddBookmark">
            <span class="action-icon">➕</span>
            <span class="action-text">添加网址</span>
          </button>
          <hr />
          <button type="button" @click="contextReorder('up')">
            <span class="action-icon">⬆️</span>
            <span class="action-text">上移</span>
          </button>
          <button type="button" @click="contextReorder('down')">
            <span class="action-icon">⬇️</span>
            <span class="action-text">下移</span>
          </button>
          <hr />
          <button type="button" @click="contextEdit">
            <span class="action-icon">✏️</span>
            <span class="action-text">编辑</span>
          </button>
          <button type="button" class="danger" @click="contextDelete">
            <span class="action-icon">🗑️</span>
            <span class="action-text">删除</span>
          </button>
        </div>
      </transition>

      <transition name="fade">
        <div v-if="modal.visible" class="modal-backdrop">
          <div class="modal">
            <h3 class="modal-title">{{ modalTitle }}</h3>
            <form @submit.prevent="submitModal">
              <div class="form-group">
                <label>名称</label>
                <input
                  v-model="modal.form.title"
                  type="text"
                  required
                  placeholder="请输入名称"
                />
              </div>
              <div class="form-group" v-if="modal.type.includes('bookmark')">
                <label>网址</label>
                <div class="url-input">
                  <input
                    v-model="modal.form.url"
                    type="url"
                    required
                    placeholder="https://example.com"
                  />
                  <button type="button" class="tertiary" @click="lookupMetadata" :disabled="metadataLoading || !modal.form.url">
                    {{ metadataLoading ? '获取中...' : '获取信息' }}
                  </button>
                </div>
                <p v-if="metadataError" class="form-error">{{ metadataError }}</p>
              </div>
              <div class="form-group" v-if="modal.type.includes('bookmark')">
                <label>图标地址</label>
                <input
                  v-model="modal.form.favicon_url"
                  type="url"
                  placeholder="自动获取或手动输入"
                />
              </div>
              <div class="modal-actions">
                <button type="submit" class="primary">确认</button>
                <button type="button" class="secondary" @click="closeModal">取消</button>
              </div>
            </form>
          </div>
        </div>
      </transition>

      <transition name="toast">
        <div v-if="toast.visible" :class="['toast', toast.type]">
          {{ toast.message }}
        </div>
      </transition>
    </div>
  </body>
</html>
