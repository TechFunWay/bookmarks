<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>分类视图 - 收藏夹</title>
  <link rel="icon" href="/favicon.ico" />
  <script src="/vue.global.prod.js"></script>
  <style>
    :root{--bg:#f3f3f3;--surface:#fff;--surface2:#f9f9f9;--text-primary:#1a1a1a;--text-secondary:#666;--text3:#999;--border:#e5e5e5;--border-hover:#d0d0d0;--primary:#007aff;--radius-md:10px;--radius-lg:14px;--shadow-lg:0 4px 12px rgba(0,0,0,.08);--card-bg:#fff;--card-bg-hover:#f5f5f5}
    [data-theme="dark"]{--bg:#0c0c0c;--surface:#1c1c1e;--surface2:#2c2c2e;--text-primary:#f5f5f5;--text-secondary:#a0a0a0;--text3:#666;--border:#2c2c2e;--border-hover:#3a3a3c;--primary:#0a84ff;--shadow-lg:0 4px 12px rgba(0,0,0,.3);--card-bg:#1c1c1e;--card-bg-hover:#2c2c2e}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{overflow-x:hidden!important;width:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh}
    .fm-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 12px;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--border)}
    [data-theme="dark"] .fm-header{background:rgba(28,28,30,.85)}
    .fm-header-title{font-size:17px;font-weight:600;flex:1;text-align:center}
    .fm-header-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border:none;border-radius:var(--radius-md);background:var(--surface2);color:var(--text-primary);font-size:14px;cursor:pointer}
    .fm-size-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;margin:0 0 10px;background:var(--surface);border-radius:var(--radius-md);font-size:13px;color:var(--text-secondary)}
    .fm-size-bar label{white-space:nowrap;font-weight:500;color:var(--text-primary)}
    .fm-size-bar input[type=range]{flex:1;cursor:pointer;accent-color:var(--primary)}
    .fm-size-bar .fm-size-val{min-width:28px;text-align:center;font-weight:600;color:var(--primary)}
    .fm-content{padding:12px}
    .fm-section{margin-bottom:16px;background:var(--card-bg);border-radius:var(--radius-lg);padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .fm-section-title{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:12px;padding-bottom:8px;border-bottom:.5px solid var(--border)}
    .fm-section-title .icon{font-size:16px}
    .fm-section-title .count{font-weight:400;font-size:12px;color:var(--text3)}
    .fm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(calc(80px * var(--s,1)),1fr));gap:calc(10px * var(--s,1))}
    .fm-item{display:flex;flex-direction:column;align-items:center;gap:calc(6px * var(--s,1));padding:calc(12px * var(--s,1)) calc(6px * var(--s,1)) calc(8px * var(--s,1));border:1px solid var(--border);border-radius:calc(12px * var(--s,1));background:var(--surface2);text-decoration:none;transition:all .15s;min-height:calc(84px * var(--s,1))}
    .fm-item:active{background:var(--card-bg-hover);transform:scale(.97)}
    .fm-icon{width:calc(44px * var(--s,1));height:calc(44px * var(--s,1));display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .fm-icon img{width:calc(40px * var(--s,1));height:calc(40px * var(--s,1));object-fit:contain}
    .fm-icon span{font-size:calc(32px * var(--s,1))}
    .fm-name{font-size:calc(12px * var(--s,1));color:var(--text-primary);text-align:center;line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;padding:0 2px}
    @media(max-width:380px){.fm-grid{gap:8px}}
    .fm-empty,.fm-loading{text-align:center;padding:60px 20px;color:var(--text-secondary)}
    .fm-empty .icon,.fm-loading .icon{font-size:48px;margin-bottom:12px}
    .fm-empty .title{font-size:16px;font-weight:500;margin-bottom:6px}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="app" v-cloak>
  <div class="fm-header">
    <button class="fm-header-btn" onclick="window.location.href='/mobile.html'">← 返回</button>
    <span class="fm-header-title">📂 分类视图</span>
    <div style="width:60px"></div>
  </div>
  <div class="fm-content">
    <div v-if="loading" class="fm-loading"><div class="spinner"></div><div>正在加载...</div></div>
    <div v-else>
      <div class="fm-size-bar">
        <label>大小</label>
          <input type="range" min="0.6" max="1.6" step="0.1" v-model.number="itemSize" @input="onSizeChange" />
          <span class="fm-size-val">{{ itemSize.toFixed(1) }}x</span>
      </div>
      <div v-for="group in folders" :key="group.id" class="fm-section">
        <div class="fm-section-title">
          <span class="icon">📁</span>
          <span>{{ group.path }}</span>
          <span class="count">（{{ group.bookmarks.length }}）</span>
        </div>
        <div class="fm-grid" :style="{'--s': itemSize}">
          <a v-for="item in group.bookmarks" :key="item.id" class="fm-item" :href="item.url" target="_blank" rel="noopener" :title="item.title">
            <div class="fm-icon"><img v-if="getFaviconUrl(item)" :src="getFaviconUrl(item)" @error="e=>e.target.style.display='none'" /><span v-else>🌏</span></div>
            <div class="fm-name">{{ getSiteName(item) }}</div>
          </a>
        </div>
      </div>
      <div v-if="folders.length===0" class="fm-empty"><div class="icon">📚</div><div class="title">暂无收藏的网址</div></div>
    </div>
  </div>
</div>
<script>
const{createApp}=Vue;
createApp({
  data(){return{tree:[],loading:true,token:localStorage.getItem('token')||'',itemSize:1}},
  computed:{
    folders(){
      const r=[];
      const walk=(nodes,pp)=>{for(const n of nodes){if(n.type==='folder'){const p=pp?pp+' / '+n.title:n.title;const bm=[];const cb=(ch)=>{for(const c of ch){if(c.type==='bookmark')bm.push(c);else if(c.type==='folder'&&c.children)cb(c.children)}};cb(n.children||[]);if(bm.length>0)r.push({id:n.id,title:n.title,path:p,bookmarks:bm});if(n.children)walk(n.children,p)}}};
      walk(this.tree,'');return r;
    }
  },
  mounted(){this.loadTheme();this.checkAuth();this.loadTree();this.loadSize()},
  methods:{
    getHeaders(ct){const h={};if(ct)h['Content-Type']=ct;if(this.token)h.Authorization=this.token;return h},
    async checkAuth(){if(this.token)return;try{const r=await fetch('/api/config/system');if(r.ok){const d=await r.json();if(d.require_login==='false')return}}catch{}window.location.href='login.html'},
    async loadTree(){this.loading=true;try{const r=await fetch('/api/tree',{headers:{...this.getHeaders(),'Cache-Control':'no-cache,no-store,must-revalidate'}});if(!r.ok)throw new Error('fail');const d=await r.json();this.tree=d.tree||d||[]}catch(e){console.error(e)}finally{this.loading=false}},
    getFaviconUrl(item){if(item.favicon_url&&item.favicon_url.trim())return item.favicon_url.trim();try{const u=new URL(item.url);return`${u.protocol}//${u.host}/favicon.ico`}catch{return''}},
    getSiteName(item){let n=(item.title||'').trim();for(const s of[' - ',' – ',' | ','—']){if(n.includes(s)){n=n.split(s)[0].trim();break}}return n},
    loadTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')},
    async loadSize(){try{const r=await fetch('/api/config',{headers:this.getHeaders()});if(r.ok){const d=await r.json();if(d.folder_view_scale){const v=parseFloat(d.folder_view_scale);if(v>=0.6&&v<=1.6){this.itemSize=v;return}}}}catch{}const ls=localStorage.getItem('folder_view_scale');if(ls){const v=parseFloat(ls);if(v>=0.6&&v<=1.6)this.itemSize=v}},
    onSizeChange(){localStorage.setItem('folder_view_scale',this.itemSize.toString());fetch('/api/config',{method:'POST',headers:this.getHeaders('application/json'),body:JSON.stringify({key:'folder_view_scale',value:this.itemSize.toString()})}).catch(()=>{})}
  }
}).mount('#app');
</script>
</body>
</html>
