<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分类视图 - 网址收藏夹</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/style.css" />
  <script src="/vue.global.prod.js"></script>
  <style>
    html,body{overflow-y:auto!important}
    .fv-page{padding:24px 32px;min-height:100vh}
    .fv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .fv-header h1{font-size:20px;font-weight:600;color:var(--text-primary);margin:0;display:flex;align-items:center;gap:8px}
    .fv-header-right{display:flex;align-items:center;gap:12px}
    .fv-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--card-bg);color:var(--text-primary);font-size:14px;cursor:pointer;text-decoration:none;transition:all .2s}
    .fv-back:hover{background:var(--card-bg-hover);border-color:var(--border-hover)}
    .fv-size-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-md);font-size:13px;color:var(--text-secondary)}
    .fv-size-bar label{white-space:nowrap;font-weight:500;color:var(--text-primary)}
    .fv-size-bar input[type=range]{width:130px;cursor:pointer;accent-color:var(--primary,#007aff)}
    .fv-size-bar .fv-size-val{min-width:28px;text-align:center;font-weight:600;color:var(--primary,#007aff)}
    [data-theme="dark"] .fv-size-bar{background:#1c1c1e;border-color:#2c2c2e;color:#a0a0a0}
    [data-theme="dark"] .fv-size-bar label{color:#f5f5f5}
    /* 分类区块背景 - 明显的灰色底 */
    .fv-section{margin-bottom:24px;background:#e9ecf2!important;border:1px solid #d4d8e0!important;border-radius:var(--radius-lg);padding:20px;transition:all .2s}
    .fv-section:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .fv-section-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .fv-section-title .icon{font-size:18px}
    .fv-section-title .count{font-weight:400;font-size:13px;color:var(--text-secondary);margin-left:4px}
    /* 网格 - 用--s缩放系数控制所有尺寸 */
    .fv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(calc(100px * var(--s,1)),1fr));gap:calc(14px * var(--s,1))}
    /* 书签卡片 - 真实尺寸缩放 */
    .fv-item{display:flex;flex-direction:column;align-items:center;gap:calc(8px * var(--s,1));padding:calc(14px * var(--s,1)) calc(8px * var(--s,1)) calc(10px * var(--s,1));background:#ffffff!important;border:none!important;border-radius:calc(12px * var(--s,1));text-decoration:none;transition:all .2s;cursor:pointer}
    .fv-item:hover{transform:translateY(-2px)}
    .fv-icon{width:calc(52px * var(--s,1));height:calc(52px * var(--s,1));display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #e0e3e8!important;border-radius:calc(12px * var(--s,1));background:#f5f6f8}
    .fv-icon img{width:calc(36px * var(--s,1));height:calc(36px * var(--s,1));object-fit:contain}
    .fv-icon span{font-size:calc(32px * var(--s,1))}
    .fv-name{font-size:calc(13px * var(--s,1));color:var(--text-primary);text-align:center;line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;padding:0 2px}
    .fv-empty{text-align:center;padding:60px 20px;color:var(--text-secondary)}
    .fv-empty .icon{font-size:48px;margin-bottom:12px}
    .fv-empty .title{font-size:18px;font-weight:500;margin-bottom:6px}
    .fv-loading{text-align:center;padding:80px 20px;color:var(--text-secondary)}
    /* 深色主题覆盖 */
    [data-theme="dark"] .fv-section{background:#18181b!important;border-color:#2a2a2e!important}
    [data-theme="dark"] .fv-item{background:#262629!important;border:none!important}
    [data-theme="dark"] .fv-icon{border-color:#3a3a3e!important;background:#1a1a1d}
    [data-theme="dark"] .fv-item:hover{box-shadow:0 6px 20px rgba(10,132,255,.2)!important}
    @media(max-width:768px){.fv-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px}}
  </style>
</head>
<body style="background: url(/img/background.jpg); background-size: cover;">
<div id="app" v-cloak>
  <div class="fv-page">
    <div class="fv-header">
      <h1>📂 分类视图</h1>
      <div class="fv-header-right">
        <div class="fv-size-bar">
          <label>大小</label>
          <input type="range" min="0.6" max="1.6" step="0.1" v-model.number="itemSize" @input="onSizeChange" />
          <span class="fv-size-val">{{ itemSize.toFixed(1) }}x</span>
        </div>
        <a href="/pc.html" class="fv-back">← 返回首页</a>
      </div>
    </div>
    <div v-if="loading" class="fv-loading">
      <div class="loading-spinner" style="margin:0 auto 16px"></div>
      <div>正在加载...</div>
    </div>
    <div v-else>
      <div v-for="group in folders" :key="group.id" class="fv-section">
        <div class="fv-section-title">
          <span class="icon">📁</span>
          <span>{{ group.path }}</span>
          <span class="count">（{{ group.bookmarks.length }}）</span>
        </div>
        <div class="fv-grid" :style="{'--s': itemSize}">
          <a v-for="item in group.bookmarks" :key="item.id" class="fv-item" :href="item.url" target="_blank" rel="noopener" :title="item.title">
            <div class="fv-icon">
              <img v-if="getFaviconUrl(item)" :src="getFaviconUrl(item)" alt="" />
              <span v-else>🌏</span>
            </div>
            <div class="fv-name">{{ getSiteName(item) }}</div>
          </a>
        </div>
      </div>
      <div v-if="folders.length === 0" class="fv-empty">
        <div class="icon">📚</div>
        <div class="title">暂无收藏的网址</div>
        <div>去首页添加一些书签吧！</div>
      </div>
    </div>
  </div>
</div>
<script>
const{createApp}=Vue;
createApp({
  data(){return{tree:[],loading:true,token:localStorage.getItem('token')||'',itemSize:1}},
  computed:{
    folders(){
      const r=[];
      const walk=(nodes,pp)=>{for(const n of nodes){if(n.type==='folder'){const p=pp?pp+' / '+n.title:n.title;const bm=[];const cb=(ch)=>{for(const c of ch){if(c.type==='bookmark')bm.push(c);else if(c.type==='folder'&&c.children)cb(c.children)}};cb(n.children||[]);if(bm.length>0)r.push({id:n.id,title:n.title,path:p,bookmarks:bm});if(n.children)walk(n.children,p)}}};
      walk(this.tree,'');return r;
    }
  },
  mounted(){this.loadTheme();this.checkAuth();this.loadTree();this.loadSize()},
  methods:{
    getHeaders(ct){const h={};if(ct)h['Content-Type']=ct;if(this.token)h.Authorization=this.token;return h},
    async checkAuth(){if(this.token)return;try{const r=await fetch('/api/config/system');if(r.ok){const d=await r.json();if(d.require_login==='false')return}}catch{}window.location.href='login.html'},
    async loadTree(){this.loading=true;try{const r=await fetch('/api/tree',{headers:{...this.getHeaders(),'Cache-Control':'no-cache,no-store,must-revalidate'}});if(!r.ok)throw new Error('fail');const d=await r.json();this.tree=d.tree||d||[]}catch(e){console.error(e)}finally{this.loading=false}},
    getFaviconUrl(item){if(item.favicon_url&&item.favicon_url.trim())return item.favicon_url.trim();try{const u=new URL(item.url);return`${u.protocol}//${u.host}/favicon.ico`}catch{return''}},
    getSiteName(item){let n=(item.title||'').trim();for(const s of[' - ',' – ',' | ','—']){if(n.includes(s)){n=n.split(s)[0].trim();break}}return n},
    loadTheme(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')},
    async loadSize(){try{const r=await fetch('/api/config',{headers:this.getHeaders()});if(r.ok){const d=await r.json();if(d.folder_view_scale){const v=parseFloat(d.folder_view_scale);if(v>=0.6&&v<=1.6){this.itemSize=v;return}}}}catch{}const ls=localStorage.getItem('folder_view_scale');if(ls){const v=parseFloat(ls);if(v>=0.6&&v<=1.6)this.itemSize=v}},
    onSizeChange(){localStorage.setItem('folder_view_scale',this.itemSize.toString());fetch('/api/config',{method:'POST',headers:this.getHeaders('application/json'),body:JSON.stringify({key:'folder_view_scale',value:this.itemSize.toString()})}).catch(()=>{})}
  }
}).mount('#app');
</script>
</body>
</html>
